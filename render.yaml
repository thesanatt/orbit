services:
  # Jac backend — knowledge graph walkers
  - type: web
    name: orbit-jac
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: jac start src/app.jac -p $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.8

  # Groq proxy API server
  - type: web
    name: orbit-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python api_server.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: PORT
        value: 3001
